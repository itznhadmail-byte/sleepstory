<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SleepAI Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{
background:linear-gradient(135deg,#08111f,#101d35);
color:#fff;
min-height:100vh;
padding:20px;
}
.container{max-width:1100px;margin:auto}
.header{
display:flex;justify-content:space-between;align-items:center;
padding:15px 0;
}
.logo{font-size:28px;font-weight:700;color:#4da3ff}
.glass{
background:rgba(255,255,255,.05);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
}
.hero{
padding:40px;
margin-top:20px;
}
h1{font-size:48px;margin-bottom:10px}
p{opacity:.85}
.input-wrap{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:25px;
}
input{
flex:1;
min-width:250px;
padding:15px;
border:none;
border-radius:12px;
outline:none;
}
button{
padding:15px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}
.primary{
background:#4da3ff;
color:white;
}
.secondary{
background:#1d2a45;
color:white;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:30px;
}
.card{
padding:20px;
text-align:center;
}
.story-box{
margin-top:25px;
padding:25px;
display:none;
white-space:pre-wrap;
line-height:1.8;
}
.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:20px;
}
.history{
margin-top:25px;
padding:20px;
}
.history-item{
padding:10px;
border-bottom:1px solid rgba(255,255,255,.08);
cursor:pointer;
}
.loading{
display:none;
margin-top:15px;
color:#8fc3ff;
}
.small{
font-size:13px;
opacity:.75;
margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<div class="logo">🌙 SleepAI</div>
<button class="secondary" onclick="setApiKey()">Set API Key</button>
</div>

<div class="hero glass">

<h1>AI Sleep Story Generator</h1>
<p>Create relaxing bedtime stories using Gemini AI</p>

<div class="input-wrap">
<input id="topic" placeholder="Forest Adventure, Ocean Dreams, Space Journey">
<button class="primary" onclick="generateStory()">Generate</button>
</div>

<div class="small">
API Key is stored only in your browser (LocalStorage).
</div>

<div id="loading" class="loading">
Generating your story...
</div>

<div id="storyBox" class="story-box glass">
<div id="storyContent"></div>

<div class="actions">
<button class="primary" onclick="copyStory()">Copy</button>
<button class="secondary" onclick="downloadStory()">Download TXT</button>
<button class="secondary" onclick="speakStory()">Read Aloud</button>
</div>
</div>

</div>

<div class="grid">
<div class="card glass">🌲 Forest Sleep</div>
<div class="card glass">🌊 Ocean Dreams</div>
<div class="card glass">🌧 Rain Meditation</div>
<div class="card glass">🌌 Space Journey</div>
</div>

<div class="history glass">
<h3>Story History</h3>
<div id="historyList"></div>
</div>

</div>

<script>

let currentStory = "";

function setApiKey(){
const key = prompt("Enter Gemini API Key");
if(key){
localStorage.setItem("gemini_api_key", key);
alert("API Key Saved");
}
}

async function generateStory(){

const apiKey = localStorage.getItem("gemini_api_key");

if(!apiKey){
alert("Please set Gemini API Key first");
return;
}

const topic = document.getElementById("topic").value.trim();

if(!topic){
alert("Enter a topic");
return;
}

document.getElementById("loading").style.display="block";
document.getElementById("storyBox").style.display="none";

const prompt = `
Write a calming bedtime sleep story about ${topic}.

Requirements:
- relaxing
- peaceful
- sleep friendly
- gentle narration
- around 700 words
`;

try{

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:prompt
}
]
}
]
})
}
);

const data = await response.json();

currentStory =
data?.candidates?.[0]?.content?.parts?.[0]?.text
|| "No response received.";

document.getElementById("storyContent").innerText = currentStory;

document.getElementById("loading").style.display="none";
document.getElementById("storyBox").style.display="block";

saveHistory(topic,currentStory);

}catch(err){

document.getElementById("loading").style.display="none";
alert("Generation failed");

console.error(err);

}

}

function copyStory(){
navigator.clipboard.writeText(currentStory);
alert("Copied");
}

function downloadStory(){

const blob = new Blob([currentStory],{
type:"text/plain"
});

const a = document.createElement("a");

a.href = URL.createObjectURL(blob);
a.download = "sleep-story.txt";
a.click();

}

function speakStory(){

speechSynthesis.cancel();

const speech =
new SpeechSynthesisUtterance(currentStory);

speech.rate = 0.85;
speech.pitch = 1;

speechSynthesis.speak(speech);

}

function saveHistory(topic,story){

let history =
JSON.parse(localStorage.getItem("story_history")||"[]");

history.unshift({
topic,
story
});

history = history.slice(0,10);

localStorage.setItem(
"story_history",
JSON.stringify(history)
);

renderHistory();

}

function renderHistory(){

const history =
JSON.parse(localStorage.getItem("story_history")||"[]");

const box =
document.getElementById("historyList");

box.innerHTML="";

history.forEach(item=>{

const div =
document.createElement("div");

div.className="history-item";

div.innerText=item.topic;

div.onclick=()=>{
currentStory=item.story;
document.getElementById("storyContent").innerText=item.story;
document.getElementById("storyBox").style.display="block";
};

box.appendChild(div);

});

}

renderHistory();

</script>

</body>
</html>
