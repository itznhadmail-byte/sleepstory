<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SleepAI - AI Sleep Story Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#08111f;
color:white;
min-height:100vh;
}

header{
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#0d1728;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:28px;
font-weight:700;
color:#4da3ff;
}

.hero{
padding:80px 20px;
text-align:center;
}

.hero h1{
font-size:60px;
margin-bottom:15px;
}

.hero p{
opacity:.8;
margin-bottom:30px;
}

.container{
max-width:1000px;
margin:auto;
}

.input-area{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

input{
width:600px;
max-width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

button{
padding:16px 25px;
border:none;
border-radius:12px;
background:#4da3ff;
color:white;
cursor:pointer;
font-weight:600;
}

button:hover{
opacity:.9;
}

.loading{
display:none;
margin-top:20px;
}

.story-box{
display:none;
margin-top:30px;
background:#101d35;
padding:25px;
border-radius:15px;
text-align:left;
line-height:1.8;
}

.actions{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.feature{
padding:60px 20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#101d35;
padding:25px;
border-radius:15px;
text-align:center;
}

footer{
text-align:center;
padding:30px;
margin-top:40px;
background:#0d1728;
}

@media(max-width:768px){

.hero h1{
font-size:38px;
}

}

</style>
</head>
<body>

<header>
<div class="logo">🌙 SleepAI</div>
</header>

<section class="hero">

<div class="container">

<h1>AI Sleep Story Generator</h1>

<p>
Generate relaxing bedtime stories instantly using Gemini AI
</p>

<div class="input-area">

<input
type="text"
id="topic"
placeholder="Example: Forest Adventure, Ocean Dreams"
/>

<button onclick="generateStory()">
Generate Story
</button>

</div>

<div class="loading" id="loading">
Generating your sleep story...
</div>

<div class="story-box" id="storyBox">

<h2>Generated Story</h2>

<br>

<div id="storyContent"></div>

<div class="actions">

<button onclick="copyStory()">
Copy Story
</button>

<button onclick="downloadStory()">
Download TXT
</button>

<button onclick="speakStory()">
Read Aloud
</button>

</div>

</div>

</div>

</section>

<section class="feature">

<div class="container">

<div class="cards">

<div class="card">
🌲<br><br>
Forest Sleep Stories
</div>

<div class="card">
🌊<br><br>
Ocean Dream Journeys
</div>

<div class="card">
🌧️<br><br>
Rain Meditation
</div>

<div class="card">
🌌<br><br>
Space Adventures
</div>

</div>

</div>

</section>

<footer>
© 2026 SleepAI - AI Sleep Story Generator
</footer>

<script>

const API_KEY = "AQ.Ab8RN6IlevwcPKarKXqC3WEVztodXliavDXm2grXPW8_eSaICw";

let currentStory = "";

async function generateStory(){

const topic =
document.getElementById("topic").value.trim();

if(!topic){
alert("Please enter a topic");
return;
}

document.getElementById("loading").style.display="block";
document.getElementById("storyBox").style.display="none";

const prompt = `
Write a calming bedtime sleep story about ${topic}.

Requirements:
- peaceful
- relaxing
- suitable for sleeping
- around 1000 words
- soft narration
`;

try{

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:prompt
}
]
}
]
})
}
);

const data = await response.json();

currentStory =
data.candidates?.[0]?.content?.parts?.[0]?.text
|| "No story generated.";

document.getElementById("storyContent")
.innerText = currentStory;

document.getElementById("loading")
.style.display="none";

document.getElementById("storyBox")
.style.display="block";

}
catch(error){

document.getElementById("loading")
.style.display="none";

alert("Error generating story");

console.error(error);

}

}

function copyStory(){

navigator.clipboard.writeText(currentStory);

alert("Story copied");

}

function downloadStory(){

const blob = new Blob(
[currentStory],
{type:"text/plain"}
);

const a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download = "sleep-story.txt";

a.click();

}

function speakStory(){

const speech =
new SpeechSynthesisUtterance(currentStory);

speech.rate = 0.85;

speech.pitch = 1;

speech.volume = 1;

speechSynthesis.speak(speech);

}

</script>

</body>
</html>
